name: Sync citations

on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch: {} # allows manual "Run workflow" trigger from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CiteSync
        run: pip install -e .

      - name: Regenerate citations from ORCID
        run: citesync generate --orcid 0009-0000-4391-3107 --output citations.md --title "Kundan Bedmutha — Publications"

      - name: Open a PR if citations changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync citations from ORCID"
          title: "Sync citations from ORCID"
          body: |
            Auto-generated by the `sync-citations` workflow.

            Regenerates `citations.md` and `citations.bib` from the current
            ORCID record. Review the diff before merging.
          branch: citesync/auto-sync
          delete-branch: true